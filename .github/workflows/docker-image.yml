name: Deploy to ECS (EC2)

on:
  push:
    branches:
        - main

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: documento-prod-ohio
  ECS_CLUSTER: cluster-docs-service
  TASKDEF_FILE: ohioprodtaskdef.json

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
  
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
  
    - name: Login to Amazon ECR
      run: |
        ACCOUNT_URL=$(aws ecr describe-repositories \
          --repository-names $ECR_REPOSITORY \
          --region $AWS_REGION \
          | jq -r '.repositories[0].repositoryUri' \
          | cut -d'/' -f1)
  
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin $ACCOUNT_URL
  
    - name: Build and Push Docker Image
      run: |
        IMAGE_TAG=${{ github.run_number }}
  
        REPO_URI=$(aws ecr describe-repositories \
          --repository-names $ECR_REPOSITORY \
          --region $AWS_REGION \
          | jq -r '.repositories[0].repositoryUri')
  
        docker build -t $REPO_URI:$IMAGE_TAG .
        docker push $REPO_URI:$IMAGE_TAG
  
        echo "IMAGE_URI=$REPO_URI:$IMAGE_TAG" >> $GITHUB_ENV
  
    - name: Prepare Task Definition
      run: |
        FAMILY=$(jq -r '.family' $TASKDEF_FILE)
        CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' $TASKDEF_FILE)
        SERVICE_NAME="${CONTAINER_NAME}-service"
  
        NEW_TASKDEF=taskdef-${{ github.run_number }}.json
  
        jq --arg IMAGE "$IMAGE_URI" \
          '.containerDefinitions[0].image = $IMAGE' \
          $TASKDEF_FILE > $NEW_TASKDEF
  
        echo "FAMILY=$FAMILY" >> $GITHUB_ENV
        echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
        echo "TASKDEF=$NEW_TASKDEF" >> $GITHUB_ENV
  
    - name: Register Task Definition
      run: |
        aws ecs register-task-definition \
          --cli-input-json file://$TASKDEF \
          --region $AWS_REGION
  
    - name: Get Latest Revision
      run: |
        REVISION=$(aws ecs describe-task-definition \
          --task-definition $FAMILY \
          --region $AWS_REGION \
          | jq -r '.taskDefinition.revision')
  
        echo "REVISION=$REVISION" >> $GITHUB_ENV
  
    - name: Check if Service Exists
      run: |
        COUNT=$(aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services $SERVICE_NAME \
          --region $AWS_REGION \
          | jq '.services | length')
  
        echo "SERVICE_EXISTS=$COUNT" >> $GITHUB_ENV
  
    - name: Create or Update Service
      run: |
        if [ "$SERVICE_EXISTS" -gt 0 ]; then
          echo "Updating existing service..."
  
          DESIRED_COUNT=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $SERVICE_NAME \
            --region $AWS_REGION \
            | jq -r '.services[0].desiredCount')
  
          if [ "$DESIRED_COUNT" = "0" ]; then
            DESIRED_COUNT=1
          fi
  
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $SERVICE_NAME \
            --task-definition $FAMILY:$REVISION \
            --desired-count $DESIRED_COUNT \
            --region $AWS_REGION
  
        else
          echo "Creating new service..."
  
          aws ecs create-service \
            --cluster $ECS_CLUSTER \
            --service-name $SERVICE_NAME \
            --task-definition $FAMILY:$REVISION \
            --desired-count 1 \
            --region $AWS_REGION
        fi
  
    - name: Wait for Deployment Stability
      run: |
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $SERVICE_NAME \
          --region $AWS_REGION
  
    - name: Deployment Complete
      run: echo "Deployment successful!"

