name: my-app
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Docker Registry
        run: |
          aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin https://724560470446.dkr.ecr.us-east-2.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build '.' --pull \
          -t 724560470446.dkr.ecr.us-east-2.amazonaws.com/my-app-repo:v_${{ github.run_number }} \
          -t 724560470446.dkr.ecr.us-east-2.amazonaws.com/my-app-repo:latest

      - name: Push Docker Image
        run: |
          docker push 724560470446.dkr.ecr.us-east-2.amazonaws.com/my-app-repo:v_${{ github.run_number }}
          docker push 724560470446.dkr.ecr.us-east-2.amazonaws.com/my-app-repo:latest

      - name: Execute Deployment Script
        run: |
          REGION=us-east-2
          REPOSITORY_NAME=my-app-repo
          CLUSTER=test
          FAMILY=$(sed -n 's/.*"family": "\(.*\)",/\1/p' taskdef.json)
          NAME=$(sed -n 's/.*"name": "\(.*\)",/\1/p' taskdef.json | head -1)
          SERVICE_NAME=${NAME}
          IMAGE_TAG=${{ github.run_number }}

          # Store the repositoryUri as a variable
          REPOSITORY_URI=$(aws ecr describe-repositories --repository-names ${REPOSITORY_NAME} --region ${REGION} | jq -r .repositories[].repositoryUri)
          echo $REPOSITORY_URI

          # Replace the build number and repository URI placeholders with the constants above
          sed -e "s;%BUILD_NUMBER%;${IMAGE_TAG};g" -e "s;%REPOSITORY_URI%;${REPOSITORY_URI};g" taskdef.json > ${NAME}-${{ github.run_number }}.json

          # Register the task definition in the repository
          aws ecs register-task-definition --family ${FAMILY} --cli-input-json file://${{ github.workspace }}/${NAME}-${{ github.run_number }}.json --region ${REGION}

          # Describe services
          SERVICES=$(aws ecs describe-services --services ${SERVICE_NAME} --cluster ${CLUSTER} --region ${REGION} | jq -r .failures[])
          echo $SERVICES

          # Get latest revision
          REVISION=$(aws ecs describe-task-definition --task-definition ${NAME} --region ${REGION} | jq -r .taskDefinition.revision)

          # Create or update service
          if [ "$SERVICES" == "" ]; then
            echo "entered existing service"
            DESIRED_COUNT=$(aws ecs describe-services --services ${SERVICE_NAME} --cluster ${CLUSTER} --region ${REGION} | jq -r .services[].desiredCount)
            echo $DESIRED_COUNT
            if [ ${DESIRED_COUNT} = "0" ]; then
              DESIRED_COUNT="1"
            fi
            aws ecs update-service --cluster ${CLUSTER} --region ${REGION} --service ${SERVICE_NAME} --task-definition ${FAMILY}:${REVISION} --desired-count ${DESIRED_COUNT}
          else
            echo "entered new service"
            aws ecs create-service --service-name ${SERVICE_NAME} --desired-count 1 --task-definition ${FAMILY} --cluster ${CLUSTER} --region ${REGION}
          fi
