<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Deployed Successfully</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        p {
            font-size: 1.1rem;
            margin: 10px 0;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            background: #22c55e;
            color: #022c22;
            font-weight: bold;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .badge {
            display: inline-block;
            margin-top: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #0ea5e9;
            color: white;
            font-size: 0.85rem;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Deployment Successful</h1>
        <p>Your Nginx server is up and running.</p>
        <p>This page confirms everything is wired correctly.</p>

        <div class="status">
            ✅ Status: Healthy
        </div>

        <div class="badge">Nginx + DevOps Ready</div>

        <div class="footer">
            <p>Now go build something awesome.</p>
            <p><a href="#">Edit this page</a> | <a href="#">Check logs</a></p>
        </div>
    </div>
</body>
</html>
